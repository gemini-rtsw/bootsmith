<section class="params" id="params">
  <h3>Boot parameters</h3>
  <p class="hint">Every field is written on Save (per your config). Leave blank to keep current.</p>
  <form hx-post="/params" hx-target="#params" hx-swap="outerHTML" class="grid params-grid">
    {% for label, key, value in fields %}
      <label>
        <span class="field-label">{{ label }}</span>
        <input name="{{ key }}" value="{{ value }}" autocomplete="off" spellcheck="false">
      </label>
    {% endfor %}
    <div class="row">
      <button type="submit" class="primary">Write and verify</button>
    </div>
  </form>
</section>
