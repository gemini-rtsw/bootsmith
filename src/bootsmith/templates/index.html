<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Bootsmith</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
  <header>
    <h1>Bootsmith</h1>
    <p class="tagline">VME boot-parameter editor over WTI serial</p>
    <div id="diag" style="font-family: monospace; font-size: 11px; color: #888; padding: 2px 8px;">diag: -</div>
  </header>

  <main id="main">
    {% include "_profile_list.html" %}
  </main>

  <footer>
    <small>v0.1 &mdash; single session at a time</small>
  </footer>

  <script>
    // Live-session controller. Loaded once with the page so it survives
    // htmx swaps that bring the .session fragment in or out of #main.
    (function () {
      const STATE_LABEL = {
        idle: "idle",
        waiting: "waiting for prompt",
        aborting: "...",
        at_prompt: "AT PROMPT",
        missed: "no prompt detected",
      };

      let pollTimer = null;
      let lastProfile = null;

      let paramsLoadedForLoader = null;

      function applyStatus(j) {
        const state = document.getElementById("status-state");
        const loaderEl = document.getElementById("status-loader");
        const aborts = document.getElementById("status-aborts");
        const bytes = document.getElementById("status-bytes");
        const banner = document.getElementById("status-banner");
        const reconnectForm = document.getElementById("reconnect-form");
        const paramsContainer = document.getElementById("params");
        if (!state) return; // session section not in DOM
        if (!j.open) {
          state.textContent = "closed";
          state.className = "state-pill state-closed";
          return;
        }
        // Detect WTI-side disconnect: socket is dead but session is still
        // "open" on our side. Show a reconnect prompt instead of pretending.
        const transportDead = j.transport && j.transport.connected === false;
        if (transportDead) {
          state.textContent = "WTI DROPPED — Reconnect";
          state.className = "state-pill state-missed";
          if (reconnectForm) reconnectForm.style.display = "";
          if (banner && j.transport.error) {
            banner.textContent = "WTI closed the socket: " + j.transport.error;
            banner.classList.remove("hidden");
          }
          if (bytes) {
            bytes.textContent = "in " + j.transport.bytes_in + "B / out " + j.transport.bytes_out + "B";
          }
          return;
        }
        if (reconnectForm) reconnectForm.style.display = "none";
        state.textContent = STATE_LABEL[j.state] || j.state;
        state.className = "state-pill state-" + j.state;
        if (loaderEl) loaderEl.textContent = j.loader ? "loader: " + j.loader : "";
        if (aborts) aborts.textContent = j.abort_chars_sent ? "abort: " + j.abort_chars_sent + "B sent" : "";
        if (bytes && j.transport) {
          bytes.textContent = "in " + j.transport.bytes_in + "B / out " + j.transport.bytes_out + "B";
        }
        if (banner) {
          if (j.notes && j.notes.length) {
            banner.textContent = j.notes[j.notes.length - 1];
            banner.classList.remove("hidden");
          } else {
            banner.classList.add("hidden");
          }
        }

        // Auto-load the params panel when we hit AT_PROMPT on a supported loader.
        if (paramsContainer && j.state === "at_prompt"
            && (j.loader === "vxworks" || j.loader === "ppcbug")) {
          if (paramsLoadedForLoader !== j.loader) {
            paramsLoadedForLoader = j.loader;
            console.log("[bootsmith] loading params panel");
            paramsContainer.innerHTML = '<p class="hint">Loading saved params...</p>';
            fetch("/params").then(r => r.text()).then(html => {
              paramsContainer.innerHTML = html;
              if (window.htmx) window.htmx.process(paramsContainer);
            });
          }
        } else if (j.state !== "at_prompt") {
          paramsLoadedForLoader = null;
        }
      }

      async function poll() {
        try {
          const r = await fetch("/session/status");
          const j = await r.json();
          applyStatus(j);
        } catch (_) {}
      }

      let ws = null;

      function sendBytes(bytes) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        let buf;
        if (typeof bytes === "string") {
          buf = new Uint8Array(bytes.length);
          for (let i = 0; i < bytes.length; i++) buf[i] = bytes.charCodeAt(i) & 0xff;
        } else {
          buf = bytes;
        }
        ws.send(buf);
      }

      function bytesAppendRaw(pre, data) {
        // data is a Uint8Array of raw bytes.
        let s = "";
        for (let i = 0; i < data.length; i++) {
          const c = data[i];
          if (c === 13) continue;
          if (c === 9 || c === 10 || (c >= 32 && c < 127)) {
            s += String.fromCharCode(c);
          } else {
            s += "\\x" + c.toString(16).padStart(2, "0");
          }
        }
        pre.appendChild(document.createTextNode(s));
        if (pre.textContent.length > 200000) {
          pre.textContent = pre.textContent.slice(-150000);
        }
        pre.scrollTop = pre.scrollHeight;
      }

      // Bind terminal keydown ONCE at the document level via event
      // delegation. The handler checks the event target and only acts
      // when the source is #terminal-input. This survives any DOM
      // churn — the input element can be detached/reattached and the
      // listener still works because it lives on document, not on the
      // input itself.
      let __terminalDelegateBound = false;

      function bindTerminal() {
        const input = document.getElementById("terminal-input");
        if (!input) return;
        if (__terminalDelegateBound) {
          // Already bound at document level; just refocus.
          input.focus();
          return;
        }
        __terminalDelegateBound = true;

        const handler = (e) => {
          if (e.target.id !== "terminal-input") return;
          const input = e.target;
          if (e.key === "Enter") {
            e.preventDefault();
            sendBytes("\r");
            input.value = "";
            return;
          }
          if (e.key === "Backspace") {
            e.preventDefault();
            sendBytes("\x7f");
            input.value = input.value.slice(0, -1);
            return;
          }
          if (e.key === "Tab") {
            e.preventDefault();
            sendBytes("\t");
            return;
          }
          if (e.key === "Escape") {
            e.preventDefault();
            sendBytes("\x1b");
            return;
          }
          if (e.ctrlKey && e.key.length === 1) {
            const code = e.key.toUpperCase().charCodeAt(0);
            if (code >= 0x40 && code <= 0x5f) {
              e.preventDefault();
              sendBytes(String.fromCharCode(code - 0x40));
              return;
            }
          }
          if (e.key.length === 1 && !e.metaKey && !e.altKey) {
            e.preventDefault();
            sendBytes(e.key);
            input.value += e.key;
            return;
          }
        };
        document.addEventListener("keydown", handler);

        // Click anywhere in the serial pane to refocus the input.
        // Delegated at document level too, for the same reason.
        document.addEventListener("click", (e) => {
          if (e.target && e.target.id === "serial") {
            const inp = document.getElementById("terminal-input");
            if (inp) inp.focus();
          }
        });
        input.focus();
      }

      let wsKeepalive = null;
      let wsReconnectTimer = null;
      let wsShouldStayOpen = false;
      let wsBackoff = 1000;
      let wsLastOpenAt = 0;

      function openWS() {
        const pre = document.getElementById("serial");
        const proto = location.protocol === "https:" ? "wss:" : "ws:";
        console.log("[bootsmith] opening WebSocket");
        wsLastOpenAt = Date.now();
        try {
          ws = new WebSocket(proto + "//" + location.host + "/ws/terminal");
        } catch (e) {
          console.warn("[bootsmith] ws ctor error", e);
          scheduleWSReconnect();
          return;
        }
        ws.binaryType = "arraybuffer";
        ws.onopen = () => {
          console.log("[bootsmith] ws open");
          wsBackoff = 1000; // reset on a stable open
          if (wsKeepalive) clearInterval(wsKeepalive);
          wsKeepalive = setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
              try { ws.send("ping"); } catch (_) {}
            }
          }, 20000);
        };
        ws.onmessage = (ev) => {
          if (typeof ev.data === "string") {
            console.log("[bootsmith] ws msg:", ev.data);
            return;
          }
          if (pre) bytesAppendRaw(pre, new Uint8Array(ev.data));
        };
        ws.onclose = () => {
          console.log("[bootsmith] ws closed");
          if (wsKeepalive) { clearInterval(wsKeepalive); wsKeepalive = null; }
          ws = null;
          // Back off ONLY when the server closed us before sending
          // anything useful (no session). Otherwise reconnect fast.
          const lived = Date.now() - wsLastOpenAt;
          if (lived < 200) {
            wsBackoff = Math.min(wsBackoff * 2, 5000);
          } else {
            wsBackoff = 500;
          }
          if (wsShouldStayOpen) scheduleWSReconnect();
        };
        ws.onerror = (e) => console.warn("[bootsmith] ws error", e);
      }

      function scheduleWSReconnect() {
        if (wsReconnectTimer || !wsShouldStayOpen) return;
        wsReconnectTimer = setTimeout(() => {
          wsReconnectTimer = null;
          if (wsShouldStayOpen) openWS();
        }, wsBackoff);
      }

      function start(profile) {
        stop();
        lastProfile = profile;
        wsShouldStayOpen = true;
        openWS();
        poll();
        pollTimer = setInterval(poll, 2000);
        bindTerminal();
      }

      function stop() {
        wsShouldStayOpen = false;
        if (wsReconnectTimer) { clearTimeout(wsReconnectTimer); wsReconnectTimer = null; }
        if (wsKeepalive) { clearInterval(wsKeepalive); wsKeepalive = null; }
        if (ws) { try { ws.close(); } catch (_) {} ws = null; }
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        lastProfile = null;
        paramsLoadedForLoader = null;
      }

      // Decide whether to start/stop based on whether the session DOM is present.
      function reconcile() {
        const section = document.querySelector(".session[data-profile]");
        if (section) {
          const p = section.getAttribute("data-profile");
          if (p !== lastProfile) start(p);
        } else {
          stop();
        }
      }

      // Run on initial load and after every htmx swap.
      document.addEventListener("DOMContentLoaded", reconcile);
      document.body.addEventListener("htmx:afterSwap", (e) => {
        reconcile();
        if (e.detail && e.detail.target && window.htmx) {
          try { window.htmx.process(e.detail.target); } catch (_) {}
        }
        bindTerminal();
      });

      // Diagnostic strip in the header — updates on every htmx event so
      // you can see at a glance what the client thinks is happening.
      const diag = document.getElementById("diag");
      function setDiag(msg) {
        if (diag) diag.textContent = "diag: " + new Date().toLocaleTimeString() + " " + msg;
      }
      const HTMX_EVENTS = [
        "htmx:beforeRequest", "htmx:beforeSend",
        "htmx:xhr:loadstart", "htmx:xhr:loadend",
        "htmx:afterRequest", "htmx:beforeSwap", "htmx:afterSwap",
        "htmx:responseError", "htmx:sendError", "htmx:timeout",
        "htmx:targetError", "htmx:swapError",
      ];
      HTMX_EVENTS.forEach((ev) => {
        document.body.addEventListener(ev, (e) => {
          const path = e.detail && e.detail.pathInfo
            ? e.detail.pathInfo.requestPath
            : (e.detail && e.detail.requestConfig ? e.detail.requestConfig.path : "?");
          setDiag(ev.replace("htmx:", "") + " " + (path || ""));
        });
      });
    })();
  </script>
</body>
</html>
