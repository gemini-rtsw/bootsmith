<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Bootsmith</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
  <header>
    <h1>Bootsmith</h1>
    <p class="tagline">VME boot-parameter editor over WTI serial</p>
  </header>

  <main id="main">
    {% include "_profile_list.html" %}
  </main>

  <footer>
    <small>v0.1 &mdash; single session at a time</small>
  </footer>

  <script>
    // Dumb terminal + lightweight status poller. The terminal is a
    // straight WebSocket <-> <pre> pipe; nothing else on the page
    // touches it. Driver work happens on the server via the existing
    // buttons (Push / Boot / Edit / Disconnect) and is independent.
    (function () {
      const STATE_LABEL = {
        idle: "idle",
        waiting: "waiting for prompt",
        aborting: "...",
        at_prompt: "AT PROMPT",
        missed: "no prompt detected",
      };

      let ws = null;
      let wsReconnectTimer = null;
      let wsKeepalive = null;
      let wsShouldStayOpen = false;
      let pollTimer = null;
      let lastProfile = null;
      let paramsLoadedForLoader = null;

      function appendSerial(data) {
        const pre = document.getElementById("serial");
        if (!pre) return;
        let s = "";
        for (let i = 0; i < data.length; i++) {
          const c = data[i];
          if (c === 13) continue;
          if (c === 9 || c === 10 || (c >= 32 && c < 127)) {
            s += String.fromCharCode(c);
          } else {
            s += "\\x" + c.toString(16).padStart(2, "0");
          }
        }
        pre.appendChild(document.createTextNode(s));
        if (pre.textContent.length > 200000) {
          pre.textContent = pre.textContent.slice(-150000);
        }
        pre.scrollTop = pre.scrollHeight;
      }

      function sendBytes(bytes) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        if (typeof bytes === "string") {
          const buf = new Uint8Array(bytes.length);
          for (let i = 0; i < bytes.length; i++) buf[i] = bytes.charCodeAt(i) & 0xff;
          ws.send(buf);
        } else {
          ws.send(bytes);
        }
      }

      function openWS() {
        const proto = location.protocol === "https:" ? "wss:" : "ws:";
        try {
          ws = new WebSocket(proto + "//" + location.host + "/ws/terminal");
        } catch (e) {
          scheduleWSReconnect();
          return;
        }
        ws.binaryType = "arraybuffer";
        ws.onopen = () => {
          if (wsKeepalive) clearInterval(wsKeepalive);
          wsKeepalive = setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
              try { ws.send("ping"); } catch (_) {}
            }
          }, 20000);
        };
        ws.onmessage = (ev) => {
          if (typeof ev.data === "string") return;
          appendSerial(new Uint8Array(ev.data));
        };
        ws.onclose = () => {
          if (wsKeepalive) { clearInterval(wsKeepalive); wsKeepalive = null; }
          ws = null;
          if (wsShouldStayOpen) scheduleWSReconnect();
        };
        ws.onerror = () => {};
      }

      function scheduleWSReconnect() {
        if (wsReconnectTimer || !wsShouldStayOpen) return;
        wsReconnectTimer = setTimeout(() => {
          wsReconnectTimer = null;
          if (wsShouldStayOpen) openWS();
        }, 1000);
      }

      // Keydown handler — bound ONCE at document level. Only acts when
      // #terminal-input is the active element. Independent of any
      // htmx swap on #params or anywhere else.
      document.addEventListener("keydown", (e) => {
        const input = document.getElementById("terminal-input");
        if (!input || document.activeElement !== input) return;
        if (e.key === "Enter") {
          e.preventDefault(); sendBytes("\r"); input.value = ""; return;
        }
        if (e.key === "Backspace") {
          e.preventDefault(); sendBytes("\x7f"); input.value = input.value.slice(0, -1); return;
        }
        if (e.key === "Tab") { e.preventDefault(); sendBytes("\t"); return; }
        if (e.key === "Escape") { e.preventDefault(); sendBytes("\x1b"); return; }
        if (e.ctrlKey && e.key.length === 1) {
          const code = e.key.toUpperCase().charCodeAt(0);
          if (code >= 0x40 && code <= 0x5f) {
            e.preventDefault(); sendBytes(String.fromCharCode(code - 0x40)); return;
          }
        }
        if (e.key.length === 1 && !e.metaKey && !e.altKey) {
          e.preventDefault(); sendBytes(e.key); input.value += e.key; return;
        }
      });
      document.addEventListener("click", (e) => {
        if (e.target && e.target.id === "serial") {
          const inp = document.getElementById("terminal-input");
          if (inp) inp.focus();
        }
      });

      function applyStatus(j) {
        const stateEl = document.getElementById("status-state");
        const loaderEl = document.getElementById("status-loader");
        const aborts = document.getElementById("status-aborts");
        const bytes = document.getElementById("status-bytes");
        const banner = document.getElementById("status-banner");
        const reconnectForm = document.getElementById("reconnect-form");
        const paramsContainer = document.getElementById("params");
        if (!stateEl) return;
        if (!j.open) {
          stateEl.textContent = "closed";
          stateEl.className = "state-pill state-closed";
          return;
        }
        const transportDead = j.transport && j.transport.connected === false;
        if (transportDead) {
          stateEl.textContent = "WTI DROPPED — Reconnect";
          stateEl.className = "state-pill state-missed";
          if (reconnectForm) reconnectForm.style.display = "";
          if (banner && j.transport.error) {
            banner.textContent = "WTI closed the socket: " + j.transport.error;
            banner.classList.remove("hidden");
          }
          if (bytes) bytes.textContent = "in " + j.transport.bytes_in + "B / out " + j.transport.bytes_out + "B";
          return;
        }
        if (reconnectForm) reconnectForm.style.display = "none";
        stateEl.textContent = STATE_LABEL[j.state] || j.state;
        stateEl.className = "state-pill state-" + j.state;
        if (loaderEl) loaderEl.textContent = j.loader ? "loader: " + j.loader : "";
        if (aborts) aborts.textContent = j.abort_chars_sent ? "abort: " + j.abort_chars_sent + "B sent" : "";
        if (bytes && j.transport) bytes.textContent = "in " + j.transport.bytes_in + "B / out " + j.transport.bytes_out + "B";
        if (banner) {
          if (j.notes && j.notes.length) {
            banner.textContent = j.notes[j.notes.length - 1];
            banner.classList.remove("hidden");
          } else {
            banner.classList.add("hidden");
          }
        }
        if (paramsContainer && j.state === "at_prompt"
            && (j.loader === "vxworks" || j.loader === "ppcbug")) {
          if (paramsLoadedForLoader !== j.loader) {
            paramsLoadedForLoader = j.loader;
            paramsContainer.innerHTML = '<p class="hint">Loading saved params...</p>';
            fetch("/params").then(r => r.text()).then(html => {
              paramsContainer.innerHTML = html;
              if (window.htmx) {
                try { window.htmx.process(paramsContainer); } catch (_) {}
              }
            });
          }
        } else if (j.state !== "at_prompt") {
          paramsLoadedForLoader = null;
        }
      }

      async function poll() {
        try {
          const r = await fetch("/session/status");
          const j = await r.json();
          applyStatus(j);
        } catch (_) {}
      }

      function start(profile) {
        stop();
        lastProfile = profile;
        wsShouldStayOpen = true;
        openWS();
        poll();
        pollTimer = setInterval(poll, 2000);
        const inp = document.getElementById("terminal-input");
        if (inp) inp.focus();
      }

      function stop() {
        wsShouldStayOpen = false;
        if (wsReconnectTimer) { clearTimeout(wsReconnectTimer); wsReconnectTimer = null; }
        if (wsKeepalive) { clearInterval(wsKeepalive); wsKeepalive = null; }
        if (ws) { try { ws.close(); } catch (_) {} ws = null; }
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        lastProfile = null;
        paramsLoadedForLoader = null;
      }

      function reconcile() {
        const section = document.querySelector(".session[data-profile]");
        if (section) {
          const p = section.getAttribute("data-profile");
          if (p !== lastProfile) start(p);
        } else {
          stop();
        }
      }

      document.addEventListener("DOMContentLoaded", reconcile);
      document.body.addEventListener("htmx:afterSwap", reconcile);
    })();
  </script>
</body>
</html>
