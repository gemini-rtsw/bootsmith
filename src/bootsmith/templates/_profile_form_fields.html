{# Macro: render editable boot-param fields for the given loader. #}
{% macro boot_param_fields(loader, fields, values) %}
{% if fields %}
<div class="grid params-grid">
  {% for label, key in fields %}
    <label>
      <span class="field-label">{{ label }}</span>
      <input name="param_{{ key }}" value="{{ values.get(key, '') }}" autocomplete="off" spellcheck="false">
    </label>
  {% endfor %}
</div>
{% else %}
<p class="hint">No boot-param fields for loader {{ loader }} yet.</p>
{% endif %}
{% endmacro %}
