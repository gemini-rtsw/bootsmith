{% from "_profile_form_fields.html" import boot_param_fields %}
{% include "_params_actions.html" %}
<h3>Edit boot params for {{ profile.name }}</h3>
<form hx-post="/profiles/{{ profile.name }}/update"
      hx-target="#params"
      hx-swap="innerHTML"
      hx-headers='{"X-Return": "params"}'>
  <div class="controls">
    <button type="submit" class="primary">Save</button>
  </div>
  {{ boot_param_fields(profile.loader_hint, fields, profile.boot_params) }}
</form>
