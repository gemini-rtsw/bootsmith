{# Always-visible action bar. Same buttons no matter which view of the
   params section is currently rendered. #}
<div class="controls">
  <form hx-post="/params/push" hx-target="#params" hx-swap="outerHTML"
        hx-confirm="Push saved params to {{ profile.name }}?"
        class="inline">
    <button type="submit" class="primary">Push to board</button>
  </form>
  <form hx-post="/params/boot" hx-target="#params" hx-swap="outerHTML"
        hx-confirm="Boot the board with current params? Session stays open."
        class="inline">
    <button type="submit" class="primary">Boot (@)</button>
  </form>
  <form hx-get="/params/edit" hx-target="#params" hx-swap="outerHTML" class="inline">
    <button type="submit">Edit</button>
  </form>
  <form hx-get="/params" hx-target="#params" hx-swap="outerHTML" class="inline">
    <button type="submit">View</button>
  </form>
  <form hx-post="/session/close" hx-target="#main" hx-swap="innerHTML" class="inline">
    <button type="submit" class="danger">Disconnect</button>
  </form>
</div>
